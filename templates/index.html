<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHEATCAM | SYSTEM INITIALIZATION</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <style>
        .cyber-grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image:
                linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -2; 
        }

        .hero-section {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            gap: 20px;
        }

        .scanner-panel {
            min-width: 450px;
            text-align: center;
        }

        .status-box {
            background: rgba(0, 0, 0, 0.6);
            border-left: 3px solid var(--cyber-yellow);
            padding: 15px;
            text-align: left;
            margin: 20px 0;
            font-family: monospace;
            color: var(--cyber-yellow);
            font-size: 0.8rem;
        }

        .glitch-logo {
            font-size: 4rem;
            margin-bottom: 10px;
            animation: glitch 1s infinite;
        }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>
    <div id="tsparticles"></div>

    <div class="hero-section">
        <div class="glass-panel scanner-panel">
            <div class="glitch-logo">👁️</div>
            <h1 class="glitch-text" style="font-size: 3rem;">CHEATCAM</h1>
            <p style="color: var(--cyber-blue); letter-spacing: 5px; font-weight: 700;">AI MONITORING SYSTEM</p>
            
            <div class="status-box">
                > INITIALIZING BIOMETRIC SCAN...<br>
                > LOADING YOLO_V8_MODULES...<br>
                > STATUS: [WAITING_FOR_USER]
            </div>

            <a href="{{ url_for('dashboard') }}" class="neon-btn" style="width: 100%;">
                Initialize Neural Link
            </a>
        </div>
        
        <p style="font-family: 'Orbitron'; font-size: 0.7rem; color: #444; margin-top: 20px;">
            CRIMINAL_CODE // ART_2077 // SECURE_ACCESS_REQUIRED
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tsparticles-engine@2/tsparticles.engine.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles-basic@2/tsparticles.basic.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles-interaction-particles-links@2/tsparticles.interaction.particles.links.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles-move-base@2/tsparticles.move.base.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles-shape-circle@2/tsparticles.shape.circle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles-updater-color@2/tsparticles.updater.color.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles-updater-opacity@2/tsparticles.updater.opacity.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles-updater-size@2/tsparticles.updater.size.min.js"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI CheatCam | Alert Database</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .bg-grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image:
                linear-gradient(rgba(0, 243, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.04) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -2;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div id="tsparticles"></div>

    <div class="app-wrapper">
        
        <nav class="sidebar">
            <div class="sidebar-brand">
                <h2 style="color: var(--neon-cyan); font-size: 1.5rem;">AI CheatCam</h2>
                <p style="color: #aaa; font-size: 0.8rem; margin-top: 5px;">Secure Logs</p>
            </div>
            
            <a href="{{ url_for('dashboard') }}" class="nav-link">🏛️ Room CS-101</a>
            <a href="{{ url_for('classroom') }}" class="nav-link">🏛️ Room CS-102</a>
            <a href="{{ url_for('database') }}" class="nav-link active">⚠️ Alert Database</a>
            <a href="#" class="nav-link">⚙️ System Config</a>
            
            <div style="margin-top: auto;">
                <a href="{{ url_for('index') }}" class="nav-link danger" style="justify-content: center;">System Logout</a>
            </div>
        </nav>

        <main class="main-content" style="grid-template-columns: 1fr;">
            <div class="glass-panel" style="height: 100%; display: flex; flex-direction: column;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 style="color: var(--neon-magenta); text-shadow: 0 0 10px var(--neon-magenta);">Incident Logs</h2>
                    <button class="neon-btn" style="margin-top: 0; padding: 10px 20px; font-size: 0.9rem;">Export to CSV</button>
                </div>
                
                <div class="glass-table-container">
                    <table class="glass-table">
                        <thead>
                            <tr>
                                <th>Timestamp</th>
                                <th>Location</th>
                                <th>Student ID</th>
                                <th>Infraction Type</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="database-body">
                            <tr>
                                <td>2026-03-12 10:42:15</td>
                                <td>CS-101</td>
                                <td>ID: 04</td>
                                <td>Looking Left (Prolonged)</td>
                                <td><span class="badge critical">Flagged</span></td>
                            </tr>
                            <tr>
                                <td>2026-03-12 10:15:22</td>
                                <td>CS-102</td>
                                <td>ID: 12</td>
                                <td>Looking Right</td>
                                <td><span class="badge warning">Warning</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tsparticles-engine@2/tsparticles.engine.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles-basic@2/tsparticles.basic.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles-interaction-particles-links@2/tsparticles.interaction.particles.links.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles-move-base@2/tsparticles.move.base.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles-shape-circle@2/tsparticles.shape.circle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles-updater-color@2/tsparticles.updater.color.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles-updater-opacity@2/tsparticles.updater.opacity.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles-updater-size@2/tsparticles.updater.size.min.js"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
